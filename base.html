<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}SecChat{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
/* ── TRON CORE ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #020608;
  --bg2:       #040c10;
  --panel:     #060e14;
  --panel2:    #091520;
  --border:    #0a2535;
  --border2:   #0d3347;
  --cyan:      #00e5ff;
  --cyan-dim:  #007a99;
  --cyan-glow: rgba(0,229,255,0.15);
  --cyan-glow2:rgba(0,229,255,0.06);
  --teal:      #00b4cc;
  --green:     #00ff9d;
  --red:       #ff2d55;
  --warn:      #ffaa00;
  --text:      #c8e8f0;
  --text2:     #5a8a9a;
  --text3:     #2a5060;
  --white:     #e8f8ff;
  --mono:      'Share Tech Mono', monospace;
  --display:   'Orbitron', sans-serif;
  --radius:    4px;
  --radius2:   2px;
}

/* Scanline texture */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
}

/* Grid bg */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

html { background: var(--bg); }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  line-height: 1.6;
  position: relative;
}

/* ── TOPBAR ──────────────────────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: rgba(2,6,8,0.95);
  border-bottom: 1px solid var(--border2);
  padding: 0 24px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(12px);
  box-shadow: 0 1px 0 var(--border2), 0 4px 32px rgba(0,229,255,0.04);
}

/* Topbar accent line */
.topbar::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.4;
}

.brand {
  display: flex; align-items: center; gap: 12px;
  text-decoration: none;
  font-family: var(--display);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 3px;
  color: var(--cyan);
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(0,229,255,0.5);
  transition: text-shadow 0.3s;
}
.brand:hover { text-shadow: 0 0 30px rgba(0,229,255,0.9); }

.brand-logo {
  width: 36px; height: 36px;
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px rgba(0,229,255,0.7));
  transition: filter 0.3s;
}
.brand:hover .brand-logo { filter: drop-shadow(0 0 12px rgba(0,229,255,1)); }

.brand-divider {
  width: 1px; height: 20px;
  background: var(--border2);
  margin: 0 4px;
}

.brand-sub {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 400;
}

.topbar-right {
  display: flex; align-items: center; gap: 16px;
  font-size: 12px;
}

.topbar-user {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 1px;
}
.topbar-user strong {
  color: var(--green);
  text-shadow: 0 0 10px rgba(0,255,157,0.4);
}

/* ── BUTTONS ─────────────────────────────────────────────────────── */
button, .btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--display);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
  background: transparent;
  color: var(--text2);
  position: relative;
  overflow: hidden;
}

button::before, .btn::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--cyan-glow2);
  opacity: 0;
  transition: opacity 0.2s;
}
button:hover::before, .btn:hover::before { opacity: 1; }
button:active, .btn:active { transform: scale(0.98); }

.btn-primary {
  border-color: var(--cyan);
  color: var(--cyan);
  box-shadow: 0 0 12px rgba(0,229,255,0.15), inset 0 0 12px rgba(0,229,255,0.05);
}
.btn-primary:hover {
  box-shadow: 0 0 20px rgba(0,229,255,0.35), inset 0 0 20px rgba(0,229,255,0.1);
  color: var(--white);
}

.btn-success {
  border-color: var(--green);
  color: var(--green);
  box-shadow: 0 0 12px rgba(0,255,157,0.12);
}
.btn-success:hover {
  box-shadow: 0 0 20px rgba(0,255,157,0.3);
  color: var(--white);
}

.btn-ghost {
  border-color: var(--border2);
  color: var(--text3);
}
.btn-ghost:hover { border-color: var(--cyan-dim); color: var(--cyan); }

.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { box-shadow: 0 0 16px rgba(255,45,85,0.3); }

.btn-sm { padding: 5px 12px; font-size: 10px; letter-spacing: 1px; }

/* ── INPUTS ──────────────────────────────────────────────────────── */
input[type="text"],
input[type="password"],
textarea {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 13px;
  font-family: var(--mono);
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  letter-spacing: 0.5px;
}
input:focus, textarea:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 2px rgba(0,229,255,0.1), 0 0 20px rgba(0,229,255,0.08);
}
textarea { resize: vertical; min-height: 70px; }
::placeholder { color: var(--text3); }

/* ── LABELS ──────────────────────────────────────────────────────── */
label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  font-family: var(--display);
  color: var(--text3);
  margin-bottom: 7px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── CARDS ───────────────────────────────────────────────────────── */
.card {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  position: relative;
}

/* Corner accents on cards */
.card::before, .card::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  border-color: var(--cyan);
  border-style: solid;
  opacity: 0.5;
}
.card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
.card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

/* ── BADGES ──────────────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px;
  font-family: var(--display);
  font-weight: 600;
  padding: 3px 8px;
  border-radius: var(--radius2);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.badge-cyan  { border: 1px solid rgba(0,229,255,0.4); color: var(--cyan);  background: rgba(0,229,255,0.07); }
.badge-green { border: 1px solid rgba(0,255,157,0.4); color: var(--green); background: rgba(0,255,157,0.07); }
.badge-warn  { border: 1px solid rgba(255,170,0,0.4); color: var(--warn);  background: rgba(255,170,0,0.07); }
.badge-blue  { border: 1px solid rgba(0,180,204,0.4); color: var(--teal);  background: rgba(0,180,204,0.07); }

/* ── ALERTS ──────────────────────────────────────────────────────── */
.alert {
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 12px;
  font-family: var(--mono);
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}
.alert-danger { background: rgba(255,45,85,0.07); border: 1px solid rgba(255,45,85,0.3); color: var(--red); }
.alert-info   { background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.2); color: var(--cyan); }

/* ── FORM GROUP ──────────────────────────────────────────────────── */
.form-group { margin-bottom: 16px; }

/* ── CONTAINER ───────────────────────────────────────────────────── */
.container { max-width: 900px; margin: 0 auto; padding: 32px 20px; position: relative; z-index: 1; }

/* ── SECTION TITLE ───────────────────────────────────────────────── */
.section-title {
  font-family: var(--display);
  font-size: 9px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin: 28px 0 12px;
  display: flex; align-items: center; gap: 12px;
}
.section-title::after {
  content: '';
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}

/* ── SCROLLBAR ───────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--cyan-dim); }

/* ── GLOW PULSE ANIMATION ────────────────────────────────────────── */
@keyframes glow-pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}
@keyframes scan {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}
</style>
{% block extra_style %}{% endblock %}
</head>
<body>

<nav class="topbar">
  <a class="brand" href="/rooms">
    <!-- Top Hat + Mustache SVG logo (inline, cyan tron style) -->
    <svg class="brand-logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="cglow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="1.2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Hat brim -->
      <path d="M8 26 Q8 30 14 31 L34 31 Q40 30 40 26 Q40 22 34 21 L14 21 Q8 22 8 26Z"
        stroke="#00e5ff" stroke-width="1.2" fill="rgba(0,229,255,0.05)" filter="url(#cglow)"/>
      <!-- Hat top -->
      <path d="M14 21 L15 10 Q15 7 24 7 Q33 7 33 10 L34 21"
        stroke="#00e5ff" stroke-width="1.2" fill="rgba(0,229,255,0.04)" filter="url(#cglow)"/>
      <!-- Hat band -->
      <line x1="14.5" y1="17" x2="33.5" y2="17" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.5"/>
      <!-- Hat band buckle -->
      <rect x="21" y="15" width="6" height="4" rx="0.5"
        stroke="#00e5ff" stroke-width="0.8" fill="rgba(0,229,255,0.1)" stroke-opacity="0.7"/>
      <line x1="23" y1="16" x2="25" y2="18" stroke="#00e5ff" stroke-width="0.6" stroke-opacity="0.6"/>
      <!-- Mustache left -->
      <path d="M14 36 Q10 33 13 31 Q17 29 20 33 Q22 35 24 34"
        stroke="#00e5ff" stroke-width="1.3" fill="none" stroke-linecap="round" filter="url(#cglow)"/>
      <!-- Mustache right -->
      <path d="M34 36 Q38 33 35 31 Q31 29 28 33 Q26 35 24 34"
        stroke="#00e5ff" stroke-width="1.3" fill="none" stroke-linecap="round" filter="url(#cglow)"/>
      <!-- Corner marks -->
      <polyline points="4,4 4,8" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.4"/>
      <polyline points="4,4 8,4" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.4"/>
      <polyline points="44,44 44,40" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.4"/>
      <polyline points="44,44 40,44" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.4"/>
    </svg>
    <span>SecChat</span>
    <div class="brand-divider"></div>
    <span class="brand-sub">Encrypted</span>
  </a>

  <div class="topbar-right">
    {% if request.cookies.get('session_id') %}
    <span class="topbar-user">// <strong>{{ user if user is defined else '' }}</strong></span>
    <form method="post" action="/logout" style="display:inline">
      <button class="btn btn-ghost btn-sm" type="submit">[ EXIT ]</button>
    </form>
    {% endif %}
    <a class="btn btn-ghost btn-sm" href="/crypto-info">[ CRYPTO ]</a>
  </div>
</nav>

<main style="position:relative; z-index:1">
{% block content %}{% endblock %}
</main>

</body>
</html>
